name: iOS Push Testing Build
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clean Workspace
        run: |
          rm -rf .expo
          rm -rf .eas
          rm -f eas-metadata.json
          rm -rf xtrusfcm.ipa

      - name: Reset EAS Auth
        run: |
          # 강제로 로그아웃 후 로컬 빌드용 인증만 사용하도록 설정
          npx eas-cli logout
          # 기존 캐시 강제 삭제
          rm -rf ~/.eas

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # 1. 여기서만 prebuild를 수행하여 빌드 번호를 반영합니다.
      - name: Expo Prebuild & Setup
        run: |
          npx expo prebuild --platform ios --clean
          cd ios && pod install --repo-update && cd ..
        env:
          RCT_NEW_ARCH_ENABLED: 1


      # 2. 빌드 실행 (이미 위에서 prebuild를 했으므로 여기선 빌드만 수행)
      - name: Build Local IPA
        run: npx eas-cli@latest build --platform ios --local --non-interactive --output=xtrusfcm.ipa --clear-cache --profile production
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          SENTRY_ALLOW_FAILURE: "true"

      # 3. 서명을 건드리지 않고, 만들어진 IPA를 그대로 업로드
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'xtrusfcm.ipa'
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}