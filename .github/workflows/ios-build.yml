name: iOS Push Testing Build
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # 중복 제거: Prebuild와 Pod install을 한 번만 실행
      - name: Expo Prebuild & Setup
        run: |
          npx expo prebuild --platform ios --clean
          cd ios
          pod install --repo-update
          cd ..

      # 빌드 파일명을 build.tar.gz로 고정하여 이후 단계에서 찾기 쉽게 함
      - name: Build Local Tarball
        run: npx eas-cli@latest build --platform ios --profile production --local --non-interactive --output=build.tar.gz
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RCT_NEW_ARCH_ENABLED: 1
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          SENTRY_DISABLE_AUTO_UPLOAD: true

      - name: Package IPA
        run: |
          mkdir -p Payload
          tar -zxf build.tar.gz -C Payload
          APP_PATH=$(find Payload -name "*.app" -maxdepth 4 | head -n 1)
          mv "$APP_PATH" Payload/xtrusfcm.app
          zip -r xtrusfcm.ipa Payload

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'xtrusfcm.ipa'
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}