name: iOS Push Testing Build
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:

      - name: Clean Workspace
        run: |
          rm -rf .expo
          rm -rf .eas
          rm -rf build.tar.gz  # <-- 이전 빌드 결과물 삭제

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # 중복 제거: Prebuild와 Pod install을 한 번만 실행
      - name: Expo Prebuild & Setup
        run: |
          npx expo prebuild --platform ios --clean
          cd ios
          pod install --repo-update
          cd ..

      # 빌드 파일명을 build.tar.gz로 고정하여 이후 단계에서 찾기 쉽게 함
      - name: Build Local Tarball
        run: |
          node -e "const fs = require('fs'); const app = JSON.parse(fs.readFileSync('app.json', 'utf8')); app.expo.ios.buildNumber = '${{ github.run_number }}'; fs.writeFileSync('app.json', JSON.stringify(app, null, 2));"
          
          # 2. 강제로 ios 폴더를 새로 생성
          npx expo prebuild --platform ios --clean
          
          # 3. 빌드 실행
          npx eas-cli@latest build --platform ios --profile production --local --non-interactive --output=xtrusfcm.ipa --clear-cache
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RCT_NEW_ARCH_ENABLED: 1
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          SENTRY_DISABLE_AUTO_UPLOAD: true

      - name: Force Update Version
        run: |
          # 1. 파일 구조 확인 및 압축 해제
          echo "Unzipping xtrusfcm.ipa to update Info.plist..."
          mkdir -p Payload_tmp
          unzip -q xtrusfcm.ipa -d Payload_tmp
          
          # 2. 빌드 번호 강제 수정
          # 경로가 Payload_tmp/Payload/*.app 형태인지 확인하고 실행
          echo "Setting CFBundleVersion to ${{ github.run_number }}..."
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" Payload_tmp/Payload/*.app/Info.plist
          
          # 3. 다시 압축하여 덮어쓰기
          rm xtrusfcm.ipa
          cd Payload_tmp && zip -rq ../xtrusfcm.ipa . && cd ..
          rm -rf Payload_tmp
          echo "IPA repackaged successfully."

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'xtrusfcm.ipa'
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          overwrite-build-number: true
