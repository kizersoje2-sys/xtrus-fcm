name: iOS Push Testing Build
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache Node Modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: ios/Pods
          key: ${{ runner.os }}-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Setup EAS CLI
        run: npm install -g eas-cli@latest

      - name: Install dependencies
        run: npm install

      # 1. 다시 --local 플랜으로 우회하여 무료 빌드를 수행합니다.
      - name: Build Local Tarball
        run: eas build --platform ios --profile development --local --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}
          SENTRY_DISABLE_AUTO_UPLOAD: true

      # 2. [핵심] 가상 Mac 안에서 깨끗하게 .tar.gz 압축을 풀고 정품 .ipa 포맷으로 조립합니다.
      - name: Package IPA on macOS Runner
        run: |
          rm -rf dist
          mkdir -p dist/Payload
          
          echo "=== Root Directory Contents ==="
          ls -la
          
          tar -zxf build-*.tar.gz -C dist/Payload
          
          echo "=== Unpacked Contents in Payload ==="
          ls -la dist/Payload
          
          TARGET_DIR=$(find dist/Payload -maxdepth 1 -name "build-*" -type d | head -n 1)
          
          if [ -n "$TARGET_DIR" ]; then
            echo "Moving $TARGET_DIR to dist/Payload/xtrusfcm.app"
            mv "$TARGET_DIR" dist/Payload/xtrusfcm.app
          else
            echo "Error: build-* folder not found. Checking if it's already an .app package..."
          fi
          
          cd dist
          zip -r xtrusfcm.ipa Payload
      - name: Upload IPA Artifact
        uses: action/upload-artifact@v4
        with:
          name: xtrusfcm-ipa
          path: dist/xtrusfcm.ipa
