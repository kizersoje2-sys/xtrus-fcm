name: iOS Push Testing Build
on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Clean Workspace
        run: |
          rm -rf .expo
          rm -rf .eas
          rm -rf xtrusfcm.ipa

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      # 1. 여기서만 prebuild를 수행하여 빌드 번호를 반영합니다.
      - name: Expo Prebuild & Setup
        run: |
          # 빌드 번호를 app.json에 강제 적용
          node -e "const fs = require('fs'); const app = JSON.parse(fs.readFileSync('app.json', 'utf8')); app.expo.ios.buildNumber = '${{ github.run_number }}'; fs.writeFileSync('app.json', JSON.stringify(app, null, 2));"
          npx expo prebuild --platform ios --clean
          cd ios && pod install --repo-update && cd ..

      # 2. 빌드 실행 (이미 위에서 prebuild를 했으므로 여기선 빌드만 수행)
      - name: Build Local IPA
        run: |
          npx eas-cli@latest build --platform ios --profile production --local --non-interactive --output=xtrusfcm.ipa --clear-cache
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          RCT_NEW_ARCH_ENABLED: 1
          SENTRY_DISABLE_AUTO_UPLOAD: "true"
          SENTRY_ALLOW_FAILURE: "true"

      # 3. 서명을 건드리지 않고, 만들어진 IPA를 그대로 업로드
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: 'xtrusfcm.ipa'
          issuer-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY }}